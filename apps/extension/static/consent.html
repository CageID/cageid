<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAGE — Confirm Access</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #12121f;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .card {
      background: #1a1a2e;
      border-radius: 16px;
      padding: 40px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(201, 168, 76, 0.2);
    }

    .logo { height: 56px; width: auto; margin-bottom: 24px; }

    .heading {
      color: #ffffff;
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .partner-name {
      color: #c9a84c;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .subtext {
      color: #a0a0b0;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 32px;
    }

    .buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .btn-allow {
      background: #c9a84c;
      color: #1a1a2e;
      border: none;
      border-radius: 8px;
      padding: 12px 36px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-allow:hover { background: #d4b85c; }
    .btn-allow:disabled { opacity: 0.6; cursor: default; }

    .btn-deny {
      background: transparent;
      color: #a0a0b0;
      border: 1px solid #3a3a4e;
      border-radius: 8px;
      padding: 12px 36px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-deny:hover { background: #2a2a3e; color: #ffffff; }
  </style>
</head>
